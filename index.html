<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Combine Comeback</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #131722;
    --bg2: #1e2230;
    --border: #2a2e39;
    --gold: #f0b90b;
    --gold-dim: #7a5c05;
    --teal: #26a69a;
    --red: #ef5350;
    --text: #d1d4dc;
    --text-dim: #4a4f60;
    --text-muted: #787b86;
    --radius: 12px;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  #app {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 0 env(safe-area-inset-bottom, 24px);
  }

  /* ── PAGE VISIBILITY ── */
  .page { display: none; width: 100%; max-width: 480px; flex-direction: column; }
  .page.active { display: flex; }

  /* ══════════════════════════════
     PAGE 1 — SETUP
  ══════════════════════════════ */
  #setup {
    min-height: 100vh;
    justify-content: center;
    align-items: center;
    padding: 40px 28px;
    gap: 0;
  }

  .logo-area {
    text-align: center;
    margin-bottom: 48px;
  }

  .nugget-hero {
    width: 120px;
    height: auto;
    margin-bottom: 16px;
    filter: drop-shadow(0 0 24px rgba(240,185,11,0.4));
    animation: float 3s ease-in-out infinite;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }

  .app-title {
    font-size: 28px;
    font-weight: 700;
    color: #fff;
    letter-spacing: -0.5px;
  }

  .app-subtitle {
    font-size: 14px;
    color: var(--text-muted);
    margin-top: 4px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  .setup-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px 24px;
    width: 100%;
  }

  .setup-label {
    font-size: 13px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 12px;
  }

  .setup-question {
    font-size: 20px;
    font-weight: 600;
    color: #fff;
    margin-bottom: 24px;
    line-height: 1.3;
  }

  .goal-input-wrap {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 8px;
  }

  .goal-btn {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: var(--border);
    border: none;
    color: var(--text);
    font-size: 22px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
    flex-shrink: 0;
  }

  .goal-btn:active { background: var(--gold); color: #000; }

  #goalInput {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--gold);
    font-size: 36px;
    font-weight: 700;
    text-align: center;
    padding: 10px;
    outline: none;
    width: 0;
    -moz-appearance: textfield;
  }

  #goalInput::-webkit-inner-spin-button,
  #goalInput::-webkit-outer-spin-button { -webkit-appearance: none; }

  #goalInput:focus { border-color: var(--gold); }

  .hint {
    font-size: 12px;
    color: var(--text-dim);
    text-align: center;
    margin-top: 8px;
    margin-bottom: 24px;
  }

  .btn-primary {
    width: 100%;
    padding: 16px;
    background: var(--gold);
    color: #000;
    font-size: 16px;
    font-weight: 700;
    border: none;
    border-radius: var(--radius);
    cursor: pointer;
    letter-spacing: 0.3px;
    transition: opacity 0.15s;
  }

  .btn-primary:active { opacity: 0.85; }
  .btn-primary:disabled { opacity: 0.35; cursor: default; }

  /* ══════════════════════════════
     PAGE 2 — TRACKER
  ══════════════════════════════ */
  #tracker {
    padding: 0;
    gap: 0;
  }

  .tracker-header {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 16px 20px 20px;
    width: 100%;
  }

  .tracker-top-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }

  .tracker-title {
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--text-muted);
  }

  .edit-goal-btn {
    font-size: 12px;
    color: var(--text-muted);
    background: none;
    border: none;
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 6px;
    transition: color 0.15s;
  }

  .edit-goal-btn:active { color: var(--gold); }

  .count-display {
    display: flex;
    align-items: baseline;
    gap: 6px;
    margin-bottom: 12px;
  }

  .count-current {
    font-size: 48px;
    font-weight: 700;
    color: var(--gold);
    line-height: 1;
  }

  .count-sep {
    font-size: 24px;
    color: var(--text-dim);
    font-weight: 300;
  }

  .count-goal {
    font-size: 24px;
    font-weight: 600;
    color: var(--text-muted);
  }

  .count-label {
    font-size: 13px;
    color: var(--text-muted);
    margin-left: 2px;
  }

  .progress-bar-wrap {
    height: 6px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    background: var(--gold);
    border-radius: 3px;
    transition: width 0.4s ease;
  }

  .progress-pct {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 6px;
    text-align: right;
  }

  /* Calendar */
  .calendar-section {
    flex: 1;
    padding: 20px 16px;
    overflow-y: auto;
  }

  .cal-header-row {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 4px;
    margin-bottom: 6px;
  }

  .cal-header-cell {
    text-align: center;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-dim);
    padding: 4px 0;
  }

  .cal-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 5px;
  }

  .cal-day {
    aspect-ratio: 1;
    border-radius: 8px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-muted);
    background: var(--bg2);
    border: 1px solid var(--border);
    cursor: pointer;
    transition: all 0.15s;
    user-select: none;
    position: relative;
    gap: 2px;
  }

  .cal-day .day-num { font-size: 13px; font-weight: 600; }
  .cal-day .day-mon { font-size: 9px; text-transform: uppercase; letter-spacing: 0.3px; opacity: 0.7; }

  .cal-day.caught {
    background: var(--gold);
    border-color: var(--gold);
    color: #000;
  }

  .cal-day.caught .day-mon { opacity: 0.6; }

  .cal-day.today {
    border-color: var(--teal);
    box-shadow: 0 0 0 1px var(--teal);
  }

  .cal-day.today.caught {
    border-color: var(--gold);
    box-shadow: 0 0 0 1px var(--gold);
  }

  .cal-day.future {
    opacity: 0.25;
    cursor: default;
    pointer-events: none;
  }

  .cal-day:not(.future):active {
    transform: scale(0.93);
  }

  /* Today button */
  .today-section {
    padding: 12px 16px;
    padding-bottom: max(12px, env(safe-area-inset-bottom, 12px));
    border-top: 1px solid var(--border);
    background: var(--bg2);
  }

  .today-btn {
    width: 100%;
    padding: 14px;
    border-radius: var(--radius);
    border: 2px solid var(--teal);
    background: transparent;
    color: var(--teal);
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .today-btn.caught-today {
    background: var(--gold);
    border-color: var(--gold);
    color: #000;
  }

  .today-btn:active { opacity: 0.8; transform: scale(0.98); }

  /* ══════════════════════════════
     PAGE 3 — CELEBRATION
  ══════════════════════════════ */
  #celebration {
    min-height: 100vh;
    align-items: center;
    justify-content: center;
    padding: 40px 28px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .confetti-canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
  }

  .celebration-inner {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }

  .cel-trophy { font-size: 80px; animation: bounce 0.6s ease; }

  @keyframes bounce {
    0% { transform: scale(0); }
    60% { transform: scale(1.2); }
    100% { transform: scale(1); }
  }

  .cel-title {
    font-size: 32px;
    font-weight: 800;
    color: var(--gold);
    line-height: 1.1;
  }

  .cel-sub {
    font-size: 16px;
    color: var(--text-muted);
    line-height: 1.5;
  }

  .cel-dates {
    font-size: 13px;
    color: var(--text-dim);
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 20px;
  }

  .btn-secondary {
    padding: 14px 32px;
    background: var(--bg2);
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 15px;
    font-weight: 600;
    border-radius: var(--radius);
    cursor: pointer;
    transition: border-color 0.15s;
  }

  .btn-secondary:active { border-color: var(--gold); }
</style>
</head>
<body>
<div id="app">

  <!-- PAGE 1: SETUP -->
  <div class="page" id="setup">
    <div class="logo-area">
      <img class="nugget-hero" src="Topstep logo.webp" alt="Topstep">
      <div class="app-title">Combine Comeback</div>
      <div class="app-subtitle">Golden Nugget Tracker</div>
    </div>

    <div class="setup-card">
      <div class="setup-label">Your Goal</div>
      <div class="setup-question">How many golden nuggets do you want to catch?</div>

      <div class="goal-input-wrap">
        <button class="goal-btn" id="decrementBtn" onclick="adjustGoal(-1)">−</button>
        <input type="number" id="goalInput" min="1" max="9999" value="30" oninput="onGoalInput()">
        <button class="goal-btn" id="incrementBtn" onclick="adjustGoal(1)">+</button>
      </div>

      <div class="hint">One golden nugget per trading day</div>

      <button class="btn-primary" id="startBtn" onclick="startJourney()">Start Journey 🪙</button>
    </div>
  </div>

  <!-- PAGE 2: TRACKER -->
  <div class="page" id="tracker">
    <div class="tracker-header">
      <div class="tracker-top-row">
        <div class="tracker-title">Golden Nugget Tracker</div>
        <button class="edit-goal-btn" onclick="editGoal()">Edit Goal</button>
      </div>
      <div class="count-display">
        <div class="count-current" id="countCurrent">0</div>
        <div class="count-sep">/</div>
        <div class="count-goal" id="countGoal">30</div>
        <div class="count-label">nuggets</div>
      </div>
      <div class="progress-bar-wrap">
        <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
      </div>
      <div class="progress-pct" id="progressPct">0% complete</div>
    </div>

    <div class="calendar-section">
      <div class="cal-header-row">
        <div class="cal-header-cell">Mon</div>
        <div class="cal-header-cell">Tue</div>
        <div class="cal-header-cell">Wed</div>
        <div class="cal-header-cell">Thu</div>
        <div class="cal-header-cell">Fri</div>
      </div>
      <div class="cal-grid" id="calGrid"></div>
    </div>

    <div class="today-section">
      <button class="today-btn" id="todayBtn" onclick="toggleToday()">
        <span id="todayBtnIcon">🪙</span>
        <span id="todayBtnText">Mark today as caught</span>
      </button>
    </div>
  </div>

  <!-- PAGE 3: CELEBRATION -->
  <div class="page" id="celebration">
    <canvas class="confetti-canvas" id="confettiCanvas"></canvas>
    <div class="celebration-inner">
      <img style="width:100px;height:auto;filter:drop-shadow(0 0 24px rgba(240,185,11,0.5));animation:bounce 0.6s ease;" src="Topstep logo.webp" alt="Topstep">
      <div class="cel-title" id="celTitle">Mission Complete!</div>
      <div class="cel-sub" id="celSub">You caught all your golden nuggets.</div>
      <div class="cel-dates" id="celDates"></div>
      <button class="btn-secondary" onclick="viewHistory()">View History</button>
    </div>
  </div>

</div>

<script>
// ── State ──────────────────────────────────────────────
const STORAGE_KEY = 'combineComeback_v1';

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : null;
  } catch { return null; }
}

function saveState(state) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

let state = null;

// ── Date utils ─────────────────────────────────────────
function toDateStr(date) {
  return date.toISOString().slice(0, 10);
}

function todayStr() {
  return toDateStr(new Date());
}

function parseDate(str) {
  const [y, m, d] = str.split('-').map(Number);
  return new Date(y, m - 1, d);
}

function isWeekday(date) {
  const dow = date.getDay();
  return dow >= 1 && dow <= 5;
}

function getWeekdaysBetween(startStr, endStr) {
  const days = [];
  const cur = parseDate(startStr);
  const end = parseDate(endStr);
  while (cur <= end) {
    if (isWeekday(cur)) days.push(toDateStr(new Date(cur)));
    cur.setDate(cur.getDate() + 1);
  }
  return days;
}

function formatDateDisplay(str) {
  const d = parseDate(str);
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

function monthAbbr(str) {
  const d = parseDate(str);
  return d.toLocaleDateString('en-US', { month: 'short' }).toUpperCase();
}

// ── Pages ──────────────────────────────────────────────
function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ── Setup page ─────────────────────────────────────────
function onGoalInput() {
  const val = parseInt(document.getElementById('goalInput').value) || 0;
  document.getElementById('startBtn').disabled = val < 1;
}

function adjustGoal(delta) {
  const input = document.getElementById('goalInput');
  const cur = parseInt(input.value) || 0;
  const next = Math.max(1, cur + delta);
  input.value = next;
  onGoalInput();
}

function startJourney() {
  const goal = parseInt(document.getElementById('goalInput').value);
  if (!goal || goal < 1) return;
  state = { goal, startDate: todayStr(), caughtDays: [] };
  saveState(state);
  renderTracker();
  showPage('tracker');
}

function editGoal() {
  const caught = state.caughtDays.length;
  const msg = caught > 0
    ? `You've already caught ${caught} nugget${caught > 1 ? 's' : ''}. Edit your goal?`
    : 'Edit your goal?';
  if (!confirm(msg)) return;
  document.getElementById('goalInput').value = state.goal;
  onGoalInput();
  showPage('setup');
}

// ── Tracker page ───────────────────────────────────────
function renderTracker() {
  const { goal, startDate, caughtDays } = state;
  const caught = caughtDays.length;
  const pct = Math.min(100, Math.round((caught / goal) * 100));

  document.getElementById('countCurrent').textContent = caught;
  document.getElementById('countGoal').textContent = goal;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressPct').textContent = pct + '% complete';

  const today = todayStr();
  const todayIsCaught = caughtDays.includes(today);

  const todayBtn = document.getElementById('todayBtn');
  const todayIsWeekday = isWeekday(new Date());

  if (!todayIsWeekday) {
    todayBtn.style.display = 'none';
  } else {
    todayBtn.style.display = 'flex';
    todayBtn.className = 'today-btn' + (todayIsCaught ? ' caught-today' : '');
    document.getElementById('todayBtnIcon').textContent = todayIsCaught ? '✓' : '🪙';
    document.getElementById('todayBtnText').textContent = todayIsCaught
      ? 'Today caught! Tap to undo'
      : 'Mark today as caught';
  }

  buildCalendar(startDate, today, caughtDays);
}

function buildCalendar(startDate, today, caughtDays) {
  const grid = document.getElementById('calGrid');
  grid.innerHTML = '';

  // Show last week, current week, next week
  const todayDate = parseDate(today);
  const todayDow = todayDate.getDay(); // 0=Sun
  // Monday of current week
  const curMonOffset = todayDow === 0 ? -6 : 1 - todayDow;
  const curMon = new Date(todayDate);
  curMon.setDate(curMon.getDate() + curMonOffset);
  // Start = Monday last week
  const weekStart = new Date(curMon);
  weekStart.setDate(weekStart.getDate() - 7);
  // End = Friday next week
  const weekEnd = new Date(curMon);
  weekEnd.setDate(weekEnd.getDate() + 7 + 4);

  const caughtSet = new Set(caughtDays);

  const cur = new Date(weekStart);
  while (cur <= weekEnd) {
    const dow = cur.getDay();
    if (dow === 0 || dow === 6) {
      cur.setDate(cur.getDate() + 1);
      continue;
    }

    const ds = toDateStr(new Date(cur));
    const isCaught = caughtSet.has(ds);
    const isToday = ds === today;
    const isFuture = ds > today;
    const isBeforeStart = ds < startDate;

    const cell = document.createElement('div');
    cell.className = 'cal-day';
    if (isCaught) cell.classList.add('caught');
    if (isToday) cell.classList.add('today');
    if (isFuture || isBeforeStart) cell.classList.add('future');

    const dayNum = document.createElement('div');
    dayNum.className = 'day-num';
    dayNum.textContent = cur.getDate();

    const dayMon = document.createElement('div');
    dayMon.className = 'day-mon';
    dayMon.textContent = cur.toLocaleDateString('en-US', { month: 'short' });

    cell.appendChild(dayNum);
    cell.appendChild(dayMon);

    if (!isFuture && !isBeforeStart) {
      // Double-tap / double-click: track last tap time, toggle on second tap within 350ms
      let lastTap = 0;
      const handleTap = (e) => {
        e.preventDefault();
        const now = Date.now();
        if (now - lastTap < 350) {
          lastTap = 0;
          toggleDay(ds);
        } else {
          lastTap = now;
        }
      };
      cell.addEventListener('touchend', handleTap, { passive: false });
      cell.addEventListener('click', handleTap);
    }

    grid.appendChild(cell);
    cur.setDate(cur.getDate() + 1);
  }
}

function toggleDay(dateStr) {
  const idx = state.caughtDays.indexOf(dateStr);
  if (idx >= 0) {
    state.caughtDays.splice(idx, 1);
  } else {
    state.caughtDays.push(dateStr);
  }
  saveState(state);

  if (state.caughtDays.length >= state.goal) {
    renderTracker();
    showCelebration();
  } else {
    renderTracker();
  }
}

function toggleToday() {
  toggleDay(todayStr());
}

// ── Celebration page ───────────────────────────────────
function showCelebration() {
  const { goal, startDate, caughtDays } = state;
  document.getElementById('celTitle').textContent = `${goal} Golden Nuggets!`;
  document.getElementById('celSub').textContent = `You crushed your goal. The combine is yours.`;

  const sortedDays = [...caughtDays].sort();
  const first = sortedDays[0];
  const last = sortedDays[sortedDays.length - 1];
  document.getElementById('celDates').textContent =
    `${formatDateDisplay(first)} → ${formatDateDisplay(last)}`;

  showPage('celebration');
  startConfetti();
}

function viewHistory() {
  stopConfetti();
  renderTracker();
  showPage('tracker');
}

// ── Confetti ───────────────────────────────────────────
let confettiAnimId = null;
const COLORS = ['#f0b90b', '#26a69a', '#ffffff', '#ef5350', '#ffd700'];

function startConfetti() {
  const canvas = document.getElementById('confettiCanvas');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  const particles = Array.from({ length: 120 }, () => ({
    x: Math.random() * canvas.width,
    y: Math.random() * -canvas.height,
    w: Math.random() * 8 + 4,
    h: Math.random() * 4 + 2,
    color: COLORS[Math.floor(Math.random() * COLORS.length)],
    speed: Math.random() * 3 + 1.5,
    angle: Math.random() * Math.PI * 2,
    spin: (Math.random() - 0.5) * 0.2,
    drift: (Math.random() - 0.5) * 1.5,
  }));

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles.forEach(p => {
      p.y += p.speed;
      p.x += p.drift;
      p.angle += p.spin;
      if (p.y > canvas.height) {
        p.y = -20;
        p.x = Math.random() * canvas.width;
      }
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.angle);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
      ctx.restore();
    });
    confettiAnimId = requestAnimationFrame(draw);
  }
  draw();
}

function stopConfetti() {
  if (confettiAnimId) {
    cancelAnimationFrame(confettiAnimId);
    confettiAnimId = null;
  }
  const canvas = document.getElementById('confettiCanvas');
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);
}

// ── Boot ───────────────────────────────────────────────
function boot() {
  state = loadState();
  if (state && state.goal && state.startDate) {
    renderTracker();
    showPage('tracker');
  } else {
    document.getElementById('goalInput').value = 30;
    onGoalInput();
    showPage('setup');
  }
}

boot();
</script>
</body>
